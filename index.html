<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Shorts Scroller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; }
        .video-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            scroll-snap-type: y mandatory;
            height: 100vh;
            overflow-y: scroll;
        }
        .video-item {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .loading { 
            color: white; 
            text-align: center; 
            padding: 20px; 
            font-family: sans-serif; 
            font-size: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="video-container" id="shorts-container">
        <div class="loading">⏳ Loading Shorts...</div>
    </div>

    <script>
        // ===========================================
        // 🔧 YAHAN APNI API KEY DAALO (Jo abhi use kar rahe ho)
        const API_KEY = 'AIzaSyC_aThLqpNAkbQyzyx6rgO-CM53xpgkag4';
        // ===========================================

        const SEARCH_QUERY = 'gaming shorts'; // Topic badlo agar chahein toh
        const MAX_RESULTS = 15;

        async function fetchShorts() {
            const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&q=${encodeURIComponent(SEARCH_QUERY)}&part=snippet,id&type=video&videoDuration=short&order=date&maxResults=${MAX_RESULTS}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('shorts-container').innerHTML = `<div class="loading">❌ Error: ${data.error.message}. Check API key.</div>`;
                    console.error(data.error);
                    return;
                }

                const container = document.getElementById('shorts-container');
                container.innerHTML = '';

                if (data.items.length === 0) {
                    container.innerHTML = '<div class="loading">😕 No shorts found. Try different keyword.</div>';
                    return;
                }

                data.items.forEach(item => {
                    const videoId = item.id.videoId;
                    if (!videoId) return;
                    
                    const div = document.createElement('div');
                    div.className = 'video-item';
                    div.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0&controls=1&rel=0" 
                                frameborder="0" allowfullscreen>
                        </iframe>
                    `;
                    container.appendChild(div);
                });

                // ===========================================================
                // 🎯 YAHAN SE NAYA CODE HAI - Jo audio band karega scroll karne par
                // ===========================================================
                
                // 1. Observer banayein jo check karega kaunsa video visible hai
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const iframe = entry.target;
                        // Agar video screen se bahar gayi (visible nahi hai)
                        if (!entry.isIntersecting) {
                            // YouTube ko command bhejo ki video pause kare
                            iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                        }
                    });
                }, { threshold: 0.5 }); // 50% visible hai ya nahi

                // 2. Saare iframes (videos) ko observer ke andar daalo
                setTimeout(() => {
                    document.querySelectorAll('.video-item iframe').forEach(iframe => {
                        observer.observe(iframe);
                    });
                }, 500);

            } catch (error) {
                console.error(error);
                document.getElementById('shorts-container').innerHTML = '<div class="loading">⚠️ Network error. Check internet.</div>';
            }
        }

        fetchShorts();
    </script>
</body>
</html>
