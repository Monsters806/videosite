<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Shorts Infinite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; }
        .video-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            scroll-snap-type: y mandatory;
            height: 100vh;
            overflow-y: scroll;
        }
        .video-item {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .loading, .loader { 
            color: white; 
            text-align: center; 
            padding: 20px; 
            font-family: sans-serif; 
            font-size: 20px;
        }
        .loader { height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="video-container" id="shorts-container">
        <div class="loading">⏳ Loading Shorts...</div>
    </div>

    <script>
        // ===========================================
        // 🔧 YAHAN APNI API KEY DAALO (Abhi ye wali daal di hai)
        const API_KEY = 'AIzaSyC_aThLqpNAkbQyzyx6rgO-CM53xpgkag4'; 
        // ===========================================

        const SEARCH_QUERY = 'gaming shorts'; // Topic badalna ho toh yahan badlo
        const MAX_RESULTS_PER_PAGE = 15; 
        let nextPageToken = null; 
        let isLoading = false;

        const container = document.getElementById('shorts-container');

        async function fetchShorts(pageToken = '') {
            if (isLoading) return;
            isLoading = true;

            if (pageToken) {
                const loaderDiv = document.createElement('div');
                loaderDiv.id = 'loader';
                loaderDiv.className = 'loader';
                loaderDiv.innerText = '⏳ Loading more...';
                container.appendChild(loaderDiv);
            }

            let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&q=${encodeURIComponent(SEARCH_QUERY)}&part=snippet,id&type=video&videoDuration=short&order=date&maxResults=${MAX_RESULTS_PER_PAGE}`;
            if (pageToken) url += `&pageToken=${pageToken}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    alert('Error: ' + data.error.message);
                    isLoading = false;
                    return;
                }

                const loader = document.getElementById('loader');
                if (loader) loader.remove();

                if (!pageToken) container.innerHTML = '';

                data.items.forEach(item => {
                    const videoId = item.id.videoId;
                    if (!videoId) return;
                    
                    const div = document.createElement('div');
                    div.className = 'video-item';
                    div.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0&controls=1&rel=0" 
                                frameborder="0" allowfullscreen>
                        </iframe>
                    `;
                    container.appendChild(div);
                });

                nextPageToken = data.nextPageToken || null;
                isLoading = false;

                setTimeout(() => {
                    document.querySelectorAll('.video-item iframe').forEach(iframe => {
                        if (!iframe.dataset.observed) {
                            iframe.dataset.observed = 'true';
                            observer.observe(iframe);
                        }
                    });
                }, 500);

            } catch (error) {
                console.error(error);
                const loader = document.getElementById('loader');
                if (loader) loader.remove();
                isLoading = false;
            }
        }

        // Audio band karne wala Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const iframe = entry.target;
                if (!entry.isIntersecting) {
                    iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                }
            });
        }, { threshold: 0.5 });

        // Infinite Scroll Detector
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !isLoading && nextPageToken !== null) {
                    fetchShorts(nextPageToken);
                }
            });
        }, { root: container, threshold: 0.1 });

        fetchShorts();

        function watchLastItem() {
            const items = container.querySelectorAll('.video-item');
            if (items.length > 0) {
                const lastItem = items[items.length - 1];
                scrollObserver.observe(lastItem);
            }
        }

        const mutationObserver = new MutationObserver(() => {
            watchLastItem();
        });
        mutationObserver.observe(container, { childList: true, subtree: false });

        setTimeout(watchLastItem, 1000);

    </script>
</body>
</html>
